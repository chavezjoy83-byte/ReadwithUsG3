<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#961313">
    <meta name="description" content="A mobile-friendly flashcard activity for ReadwithUs.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flashcards - ReadwithUs</title>
    <style>
        body {
            background-image: url("https://images.stockcake.com/public/c/d/a/cda0dc0a-97a1-489e-9dbe-268aaf096c9e_large/infinite-library-portal-stockcake.jpg");
            background-size: cover;
            background-attachment: scroll;
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgb(152, 13, 13);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
            border: 2px solid white;
            box-sizing: border-box;
        }

        .flip-card {
            background-color: transparent;
            width: min(90vw, 250px);
            height: auto;
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            min-height: 280px;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .flip-card-front {
            background-color: white;
            color: rgb(152, 13, 13);
            font-size: 22px;
            font-weight: bold;
            border: 2px solid rgb(152, 13, 13);
        }

        .flip-card-back {
            background-color: rgb(152, 13, 13);
            color: white;
            transform: rotateY(180deg);
        }

        .flip-card-back img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 2px solid white;
        }

        .flip-card-back p {
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
            padding: 0 5px;
        }
        @media (max-width: 760px) {
            body { padding: 16px; gap: 14px; justify-content: flex-start; }
            .back-link { top: 12px; left: 12px; padding: 10px 14px; }
            .flip-card { width: 100%; max-width: 320px; }
            .flip-card-inner { min-height: 260px; }
            .flip-card-back img { height: 130px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Home</a>

<script>
    const data = [
        { word: "lovely", img: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=500&q=80" },
        { word: "beautiful", img: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=500&q=80" },
        { word: "nature", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80" },
        { word: "lush", img: "https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=500&q=80" },
        { word: "crystal clear", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80" },
        { word: "country", img: "https://images.unsplash.com/photo-1518509562904-e7ef99cdcc86?auto=format&fit=crop&w=500&q=80" },
        { word: "warm gestures", img: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=500&q=80" },
        { word: "celebration", img: "https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=500&q=80" },
        { word: "destroy", img: "https://images.unsplash.com/photo-1596755094514-f87e34083b2c?auto=format&fit=crop&w=500&q=80" },
        { word: "recover", img: "https://images.unsplash.com/photo-1584483766114-118b18567341?auto=format&fit=crop&w=500&q=80" },
        { word: "damages", img: "https://images.unsplash.com/photo-1541963463532-d68292c34b19?auto=format&fit=crop&w=500&q=80" },
        { word: "diverse culture", img: "https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=500&q=80" },
        { word: "diverse place", img: "https://images.unsplash.com/photo-1449034446853-66c86144b0ad?auto=format&fit=crop&w=500&q=80" },
        { word: "locals", img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=500&q=80" },
        { word: "geography", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=500&q=80" }
    ];

    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'flip-card';

        card.innerHTML = `
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    ${item.word}
                </div>
                <div class="flip-card-back">
                    <img src="${item.img}" alt="${item.word}" loading="lazy">
                    <p><strong>${item.word}</strong><br>${item.meaning}</p>
                </div>
            </div>
        `;

        return card;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const body = document.body;
        data.forEach(item => body.appendChild(createCard(item)));
    });
</script>

</body>
</html>
