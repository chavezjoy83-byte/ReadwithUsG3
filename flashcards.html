<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#961313">
    <meta name="description" content="A mobile-friendly flashcard activity for ReadwithUs.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flashcards - ReadwithUs</title>
    <style>
        body {
            background-image: url("https://images.stockcake.com/public/c/d/a/cda0dc0a-97a1-489e-9dbe-268aaf096c9e_large/infinite-library-portal-stockcake.jpg");
            background-size: cover;
            background-attachment: scroll;
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgb(152, 13, 13);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
            border: 2px solid white;
            box-sizing: border-box;
        }

        .flip-card {
            background-color: transparent;
            width: min(90vw, 250px);
            height: auto;
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            min-height: 280px;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .flip-card-front {
            background-color: white;
            color: rgb(152, 13, 13);
            font-size: 22px;
            font-weight: bold;
            border: 2px solid rgb(152, 13, 13);
        }

        .flip-card-back {
            background-color: rgb(152, 13, 13);
            color: white;
            transform: rotateY(180deg);
        }

        .flip-card-back img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 2px solid white;
        }

        .flip-card-back p {
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
            padding: 0 5px;
        }
        @media (max-width: 760px) {
            body { padding: 16px; gap: 14px; justify-content: flex-start; }
            .back-link { top: 12px; left: 12px; padding: 10px 14px; }
            .flip-card { width: 100%; max-width: 320px; }
            .flip-card-inner { min-height: 260px; }
            .flip-card-back img { height: 130px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Home</a>

<script>
    const data = [
    { word: "Lovely", meaning: "Something that is very pleasant, delightful, or enjoyable.", img: "https://images.unsplash.com/photo-1519741497674-611481863552?w=600&q=80" },
    { word: "Beautiful", meaning: "Something that is very pretty or pleasing to look at.", img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&q=80" },
    { word: "Nature", meaning: "Everything in the world not made by humans, like plants and animals.", img: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80" },
    { word: "Lush", meaning: "An area with thick, healthy, and green plant growth.", img: "https://images.unsplash.com/photo-1448375240586-882707db8548?w=600&q=80" },
    { word: "Crystal Clear", meaning: "So clean and transparent that you can see through it.", img: "https://images.unsplash.com/photo-1504541991443-4e8971f11c50?w=600&q=80" },
    { word: "Country", meaning: "A specific nation or land with its own government.", img: "https://images.unsplash.com/photo-1526481476659-01582239d524?w=600&q=80" },
    { word: "Warm Gestures", meaning: "Kind actions like a smile or wave that show friendliness.", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=600&q=80" },
    { word: "Celebration", meaning: "A happy event or party held to mark a special occasion.", img: "https://images.unsplash.com/photo-1467810563316-c54760565257?w=600&q=80" },
    { word: "Destroy", meaning: "To break something so badly that it cannot be used.", img: "https://images.unsplash.com/photo-1596755094514-f87e34083b2c?w=600&q=80" },
    { word: "Recover", meaning: "To get back to a normal, healthy state after being hurt.", img: "https://images.unsplash.com/photo-1584483766114-118b18567341?w=600&q=80" },
    { word: "Damages", meaning: "Physical harm or injury caused to an object or a place.", img: "https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=600&q=80" },
    { word: "Diverse Culture", meaning: "A group of people with many different traditions and beliefs.", img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?w=600&q=80" },
    { word: "Diverse Place", meaning: "A location where you can find many different kinds of people.", img: "https://images.unsplash.com/photo-1527631746610-bca00a040d60?w=600&q=80" },
    { word: "Locals", meaning: "The people who live and belong in a specific town or area.", img: "https://images.unsplash.com/photo-1488190211105-8b0e65b80b4e?w=600&q=80" },
    { word: "Geography", meaning: "The study of the Earth’s lands, oceans, and climates.", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600&q=80" }
    ];

    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'flip-card';

        card.innerHTML = `
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    ${item.word}
                </div>
                <div class="flip-card-back">
                    <img src="${item.img}" alt="${item.word}" loading="lazy">
                    <p><strong>${item.word}</strong><br>${item.meaning}</p>
                </div>
            </div>
        `;

        return card;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const body = document.body;
        data.forEach(item => body.appendChild(createCard(item)));
    });
</script>

</body>
</html>
