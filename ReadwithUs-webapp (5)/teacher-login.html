﻿<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#961313">
    <meta name="description" content="Teacher portal for ReadwithUs student records.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Teacher Portal - Student Records</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; background-color: #f4f4f9; margin: 0; box-sizing: border-box; }
        .dashboard { max-width: 1000px; margin: auto; background: white; padding: 28px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); width: 100%; box-sizing: border-box; }
        h1 { color: rgb(152, 13, 13); margin-bottom: 18px; font-size: clamp(1.6rem, 3vw, 2.2rem); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .toolbar a { color: rgb(152, 13, 13); text-decoration: none; font-weight: 700; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 620px; }
        th, td { border: 1px solid #ddd; padding: 14px; text-align: left; }
        th { background-color: rgb(152, 13, 13); color: white; }
        th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { text-align: center; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-clear { margin-top: 20px; padding: 12px 25px; background: #dc3545; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-clear:hover { background: #a71d2a; }
        .delete-icon { cursor: pointer; color: #dc3545; font-size: 18px; border: none; background: transparent; }
        .delete-icon:hover { color: #a71d2a; }
        @media (max-width: 760px) {
            body { padding: 16px; }
            .dashboard { padding: 18px; }
            .toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
            .toolbar a { width: 100%; }
            .table-wrapper { overflow-x: auto; }
            table, th, td { font-size: 13px; }
            th, td { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="toolbar">
        <a href="index.html">&larr; Back to Login</a>
        <a href="index.html">🏠 Home</a>
    </div>
    <h1>Student Quiz Records</h1>
    
    <table id="studentTable">
        <thead>
            <tr>
                <th>Student Name</th>
                <th style="text-align: center;">Code</th>
                <th>Activity Source</th>
                <th>Date</th>
                <th style="text-align: center;">Score</th>
                <th style="width: 80px; text-align: center;">Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    
    <button class="btn-clear" onclick="clearData()">Clear All Records</button>
</div>

<script>
    function loadRecords() {
        let records = JSON.parse(localStorage.getItem('quizRecords') || "[]");
        let tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        if (records.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No records found.</td></tr>";
            return;
        }

        records.forEach((student, index) => {
            let row = tableBody.insertRow(-1);
            row.innerHTML = `
                <td>${student.name}</td>
                <td style="text-align: center;">${student.code || '&mdash;'}</td>
                <td>${student.activity}</td>
                <td>${student.date}</td>
                <td style="text-align: center;">${student.score}</td>
                <td style="text-align: center;"><button class="delete-icon" onclick="deleteRecord(${index})" title="Delete this record">🗑️</button></td>
            `;
        });
    }

    function deleteRecord(index) {
        if (!confirm('Delete or keep this record?')) return;
        let records = JSON.parse(localStorage.getItem('quizRecords') || "[]");
        records.splice(index, 1);
        localStorage.setItem('quizRecords', JSON.stringify(records));
        loadRecords();
    }

    function clearData() {
        if (confirm("Are you sure you want to delete all student records?")) {
            localStorage.removeItem('quizRecords');
            loadRecords();
        }
    }

    loadRecords();
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        });
    }
</script>
</body>
</html>
